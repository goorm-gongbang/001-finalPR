<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#616161"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">위험도에 따라 단계별 대응</text>
  <text x="490" y="62" text-anchor="middle" font-size="13" fill="#757575">한 번에 차단하지 않고 점진적으로 완충 — 정상 사용자 오탐 방지</text>

  <!-- ================= Tier Flow ================= -->
  <!-- T0 -->
  <rect x="60" y="120" width="180" height="110" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <text x="150" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#2e7d32">T0</text>
  <text x="150" y="180" text-anchor="middle" font-size="16" fill="#2e7d32" font-weight="600">통과</text>
  <text x="150" y="208" text-anchor="middle" font-size="11" fill="#558b2f">정상</text>

  <!-- T1 -->
  <rect x="270" y="120" width="180" height="110" rx="12" fill="#fffde7" stroke="#fdd835" stroke-width="2"/>
  <text x="360" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#f57f17">T1</text>
  <text x="360" y="180" text-anchor="middle" font-size="16" fill="#f57f17" font-weight="600">약한 지연</text>
  <text x="360" y="208" text-anchor="middle" font-size="11" fill="#9e7d0a">~80ms</text>

  <!-- T2 -->
  <rect x="480" y="120" width="180" height="110" rx="12" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="570" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#e65100">T2</text>
  <text x="570" y="180" text-anchor="middle" font-size="16" fill="#e65100" font-weight="600">강한 지연</text>
  <text x="570" y="208" text-anchor="middle" font-size="11" fill="#bf360c">~250ms</text>

  <!-- T3 -->
  <rect x="690" y="120" width="180" height="110" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="780" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#b71c1c">T3</text>
  <text x="780" y="180" text-anchor="middle" font-size="16" fill="#b71c1c" font-weight="600">차단</text>
  <text x="780" y="208" text-anchor="middle" font-size="11" fill="#b71c1c">Block</text>

  <!-- Arrows between tiers -->
  <line x1="245" y1="175" x2="265" y2="175" stroke="#616161" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="455" y1="175" x2="475" y2="175" stroke="#616161" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="665" y1="175" x2="685" y2="175" stroke="#616161" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Caption under tier bar -->
  <text x="465" y="270" text-anchor="middle" font-size="13" fill="#424242" font-style="italic">
    위험도가 올라갈수록 강한 개입 — 챌린지가 아닌 지연으로 완충
  </text>

  <!-- ================= Separator ================= -->
  <line x1="80" y1="300" x2="900" y2="300" stroke="#e0e0e0" stroke-dasharray="6 4"/>
  <text x="490" y="294" text-anchor="middle" font-size="11" fill="#9e9e9e" font-weight="600" style="letter-spacing:2px">+ 별도의 단계 게이트</text>

  <!-- ================= Security Quiz Gate ================= -->
  <!-- Flow stages -->
  <rect x="60" y="340" width="160" height="70" rx="10" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="140" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#424242">대기열 / 진입</text>
  <text x="140" y="388" text-anchor="middle" font-size="11" fill="#757575">S0 ~ S3</text>

  <rect x="260" y="340" width="200" height="70" rx="10" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2"/>
  <text x="360" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">좌석 선택 단계 진입</text>
  <text x="360" y="388" text-anchor="middle" font-size="11" fill="#6a1b9a">S4 · S5</text>

  <!-- Gate check -->
  <polygon points="500,375 540,345 580,375 540,405"
           fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="540" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">보안 퀴즈</text>
  <text x="540" y="388" text-anchor="middle" font-size="11" fill="#e65100">통과했는가?</text>

  <!-- Yes path -->
  <path d="M 580 375 L 640 375" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="610" y="365" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="700">YES</text>
  <rect x="640" y="345" width="130" height="60" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <text x="705" y="375" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">좌석 선택 진행</text>

  <!-- No path -->
  <path d="M 540 405 L 540 460" stroke="#e53935" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="555" y="435" font-size="11" fill="#c62828" font-weight="700">NO</text>
  <rect x="440" y="460" width="200" height="60" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="540" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">보안 퀴즈 강제 (HTTP 428)</text>
  <text x="540" y="505" text-anchor="middle" font-size="11" fill="#b71c1c">등급과 무관하게 요구</text>

  <!-- Arrow from stage to gate -->
  <line x1="460" y1="375" x2="498" y2="375" stroke="#616161" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="220" y1="375" x2="258" y2="375" stroke="#616161" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Bottom note -->
  <text x="490" y="548" text-anchor="middle" font-size="12" fill="#6a1b9a" font-weight="600">
    ※ 보안 퀴즈는 "T2가 되면 뜨는 것"이 아니라, "좌석 선택 단계 진입 시점"의 독립 게이트
  </text>
</svg>
