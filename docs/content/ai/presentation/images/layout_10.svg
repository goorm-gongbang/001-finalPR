<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="1200" height="675" fill="#f8f9fa"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="88" fill="#212121"/>
  <text x="48" y="46" font-size="24" font-weight="700" fill="#ffffff">맞대결 결과 + 마무리</text>
  <text x="48" y="72" font-size="13" fill="#bdbdbd">알려진 취약점을 찾는 침투테스트를 넘어, 우리는 알려지지 않은 공격까지 재현해 맞대결했다.</text>
  <text x="1160" y="50" text-anchor="end" font-size="13" fill="#757575">10 / 11</text>

  <!-- KPI cards -->
  <rect x="60" y="108" width="340" height="140" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="60" y="108" width="340" height="10" rx="12" fill="#e53935"/>
  <text x="230" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#b71c1c">AI 공격 에이전트 탐지율</text>
  <text x="230" y="196" text-anchor="middle" font-size="36" font-weight="700" fill="#e0e0e0">??%</text>
  <rect x="100" y="220" width="260" height="18" rx="4" fill="#ffebee"/>
  <text x="230" y="233" text-anchor="middle" font-size="11" fill="#ef9a9a">수치 확정 후 기입 예정</text>

  <rect x="430" y="108" width="340" height="140" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="430" y="108" width="340" height="10" rx="12" fill="#fb8c00"/>
  <text x="600" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">False Positive 비율</text>
  <text x="600" y="196" text-anchor="middle" font-size="36" font-weight="700" fill="#e0e0e0">??%</text>
  <rect x="470" y="220" width="260" height="18" rx="4" fill="#fff3e0"/>
  <text x="600" y="233" text-anchor="middle" font-size="11" fill="#ffcc80">수치 확정 후 기입 예정</text>

  <rect x="800" y="108" width="340" height="140" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="800" y="108" width="340" height="10" rx="12" fill="#1976d2"/>
  <text x="970" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">판정 지연 p95</text>
  <text x="970" y="196" text-anchor="middle" font-size="36" font-weight="700" fill="#e0e0e0">??ms</text>
  <rect x="840" y="220" width="260" height="18" rx="4" fill="#e3f2fd"/>
  <text x="970" y="233" text-anchor="middle" font-size="11" fill="#90caf9">수치 확정 후 기입 예정</text>

  <!-- Convergence table -->
  <rect x="60" y="270" width="1080" height="186" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="60" y="270" width="1080" height="38" rx="10" fill="#37474f"/>
  <rect x="60" y="296" width="1080" height="12" fill="#37474f"/>
  <text x="600" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">공격과 방어, 같은 구조로 수렴했다</text>

  <!-- Table header -->
  <rect x="60" y="310" width="360" height="36" fill="#eceff1"/>
  <rect x="420" y="310" width="360" height="36" fill="#e8f5e9"/>
  <rect x="780" y="310" width="360" height="36" fill="#e3f2fd"/>
  <text x="240" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#546e7a"> </text>
  <text x="600" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">결정론 (빠름 · 재현)</text>
  <text x="960" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">LLM (학습 · 유연)</text>

  <!-- Row: attack -->
  <rect x="60" y="346" width="360" height="48" fill="#fafafa"/>
  <rect x="420" y="346" width="360" height="48" fill="#f9fbe7"/>
  <rect x="780" y="346" width="360" height="48" fill="#f3f8ff"/>
  <line x1="60" y1="394" x2="1140" y2="394" stroke="#e0e0e0"/>
  <text x="240" y="376" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">공격</text>
  <text x="600" y="376" text-anchor="middle" font-size="13" fill="#33691e">Agent 워크플로우</text>
  <text x="960" y="376" text-anchor="middle" font-size="13" fill="#1565c0">Swarm Coordinator</text>

  <!-- Row: defense -->
  <rect x="60" y="394" width="360" height="48" fill="#fafafa"/>
  <rect x="420" y="394" width="360" height="48" fill="#f9fbe7"/>
  <rect x="780" y="394" width="360" height="48" fill="#f3f8ff"/>
  <text x="240" y="424" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">방어</text>
  <text x="600" y="424" text-anchor="middle" font-size="13" fill="#33691e">D0 런타임 (Online)</text>
  <text x="960" y="424" text-anchor="middle" font-size="13" fill="#1565c0">오프라인 튜닝 · 재검토</text>

  <!-- Vertical dividers -->
  <line x1="420" y1="310" x2="420" y2="442" stroke="#e0e0e0"/>
  <line x1="780" y1="310" x2="780" y2="442" stroke="#e0e0e0"/>

  <text x="600" y="462" text-anchor="middle" font-size="12" fill="#757575" font-style="italic">LLM을 런타임에 두면 지연, 아예 빼면 적응력 없음 → 양쪽 모두: 실행은 결정론, 판단만 LLM</text>

  <!-- Closing quote -->
  <rect x="60" y="476" width="1080" height="124" rx="10" fill="#263238"/>
  <text x="600" y="516" text-anchor="middle" font-size="14" fill="#eceff1">침투테스트는 <tspan font-weight="700" fill="#80cbc4">알려진 취약점</tspan>을 찾고,</text>
  <text x="600" y="544" text-anchor="middle" font-size="14" fill="#eceff1">우리는 <tspan font-weight="700" fill="#ef9a9a">알려지지 않은 공격</tspan>까지 재현했습니다.</text>
  <text x="600" y="572" text-anchor="middle" font-size="13" fill="#90a4ae">티켓팅 매크로 방어는 보안 테스트 한 번이 아니라,</text>
  <text x="600" y="592" text-anchor="middle" font-size="14" font-weight="700" fill="#80deea">공격자와 같은 속도로 진화하는 시스템이 답입니다.</text>

  <!-- 11장 연결 -->
  <rect x="0" y="616" width="1200" height="59" fill="#1a237e"/>
  <text x="600" y="650" text-anchor="middle" font-size="13" fill="#c5cae9">→ 11장: "그리고 궁극적으로는 — 매크로의 경제성 자체를 깎는다"</text>
</svg>
