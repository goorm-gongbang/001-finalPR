<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 675" font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="1200" height="675" fill="#f0f2f5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="76" fill="#1a237e"/>
  <text x="48" y="44" font-size="24" font-weight="700" fill="#ffffff">AI Defense — Online Plane</text>
  <text x="48" y="68" font-size="12" fill="#9fa8da">런타임 판정은 결정론 상태머신 — 지연 없음. 등급 게이트 + VQA 관문 분리.</text>
  <text x="1160" y="44" text-anchor="end" font-size="12" fill="#7986cb">9-1 / 11</text>

  <!-- Left narrow panel: principle -->
  <rect x="32" y="84" width="220" height="558" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.2"/>
  <rect x="32" y="84" width="220" height="34" rx="10" fill="#e8eaf6"/>
  <rect x="32" y="108" width="220" height="10" fill="#e8eaf6"/>
  <text x="52" y="107" font-size="11" font-weight="700" fill="#1a237e">설계 원칙</text>
  <text x="52" y="134" font-size="11" fill="#37474f">ext_authz 경로:</text>
  <text x="52" y="152" font-size="10" fill="#546e7a">Istio → AI Defense API</text>
  <line x1="52" y1="166" x2="232" y2="166" stroke="#e8eaf6"/>
  <text x="52" y="184" font-size="11" fill="#37474f">행동 지표 7가지:</text>
  <text x="52" y="202" font-size="10" fill="#546e7a">linearityRatio</text>
  <text x="52" y="218" font-size="10" fill="#546e7a">tremorStdDev</text>
  <text x="52" y="234" font-size="10" fill="#546e7a">dwellTime</text>
  <text x="52" y="250" font-size="10" fill="#546e7a">pathRatio</text>
  <text x="52" y="266" font-size="10" fill="#546e7a">avgVelocity</text>
  <text x="52" y="282" font-size="10" fill="#546e7a">totalDist</text>
  <text x="52" y="298" font-size="10" fill="#546e7a">botRisk</text>
  <line x1="52" y1="312" x2="232" y2="312" stroke="#e8eaf6"/>
  <text x="52" y="330" font-size="11" fill="#37474f">원칙:</text>
  <text x="52" y="348" font-size="10" fill="#546e7a">자연어 판단 없음</text>
  <text x="52" y="364" font-size="10" fill="#546e7a">결정론적 규칙만</text>
  <text x="52" y="380" font-size="10" fill="#546e7a">지연 최소화</text>

  <!-- Right main: tier_flow image -->
  <rect x="262" y="84" width="906" height="558" rx="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <image x="266" y="88" width="898" height="550" href="slide6_tier_flow.png" preserveAspectRatio="xMidYMid meet"/>
