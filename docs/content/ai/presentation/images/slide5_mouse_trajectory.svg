<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">형태는 인간, 속도는 장인</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#757575">같은 "시작 → 좌석" 경로를 두 공격자가 어떻게 이동하는가</text>

  <!-- Divider -->
  <line x1="450" y1="90" x2="450" y2="420" stroke="#e0e0e0" stroke-dasharray="4 4"/>

  <!-- ================= LEFT: 단순 봇 ================= -->
  <rect x="40" y="90" width="380" height="320" rx="10" fill="#fff5f5" stroke="#ffcdd2"/>
  <text x="230" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">단순 봇 매크로</text>
  <text x="230" y="138" text-anchor="middle" font-size="12" fill="#c62828">직선 점프 · 손떨림 없음</text>

  <!-- grid -->
  <g stroke="#f1e0e0" stroke-width="1">
    <line x1="60" y1="170" x2="400" y2="170"/>
    <line x1="60" y1="230" x2="400" y2="230"/>
    <line x1="60" y1="290" x2="400" y2="290"/>
    <line x1="60" y1="350" x2="400" y2="350"/>
    <line x1="100" y1="160" x2="100" y2="400"/>
    <line x1="180" y1="160" x2="180" y2="400"/>
    <line x1="260" y1="160" x2="260" y2="400"/>
    <line x1="340" y1="160" x2="340" y2="400"/>
  </g>

  <!-- Path: jagged right-angles -->
  <polyline points="90,175 90,300 240,300 240,370 360,370"
            fill="none" stroke="#e53935" stroke-width="3"
            marker-end="url(#arrowRed)"/>

  <!-- Start marker -->
  <circle cx="90" cy="175" r="7" fill="#616161"/>
  <text x="90" y="162" text-anchor="middle" font-size="11" fill="#424242">시작</text>

  <!-- Target -->
  <rect x="350" y="360" width="20" height="20" fill="#e53935" rx="2"/>
  <text x="360" y="398" text-anchor="middle" font-size="11" fill="#c62828" font-weight="600">좌석</text>

  <!-- ================= RIGHT: AI 에이전트 ================= -->
  <rect x="480" y="90" width="380" height="320" rx="10" fill="#f0f7ff" stroke="#bbdefb"/>
  <text x="670" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#0d47a1">AI 공격 에이전트</text>
  <text x="670" y="138" text-anchor="middle" font-size="12" fill="#0d47a1">부드러운 곡선 · 미세 떨림</text>

  <!-- grid -->
  <g stroke="#e0ecf9" stroke-width="1">
    <line x1="500" y1="170" x2="840" y2="170"/>
    <line x1="500" y1="230" x2="840" y2="230"/>
    <line x1="500" y1="290" x2="840" y2="290"/>
    <line x1="500" y1="350" x2="840" y2="350"/>
    <line x1="540" y1="160" x2="540" y2="400"/>
    <line x1="620" y1="160" x2="620" y2="400"/>
    <line x1="700" y1="160" x2="700" y2="400"/>
    <line x1="780" y1="160" x2="780" y2="400"/>
  </g>

  <!-- Smooth bezier path with subtle wobble -->
  <path d="M 530 175
           C 580 200, 600 250, 640 260
           S 690 305, 720 315
           S 770 355, 800 370"
        fill="none" stroke="#1976d2" stroke-width="3"
        marker-end="url(#arrowBlue)"/>

  <!-- micro-wobble dots along the path -->
  <g fill="#1976d2" opacity="0.35">
    <circle cx="562" cy="196" r="1.5"/>
    <circle cx="600" cy="240" r="1.5"/>
    <circle cx="650" cy="272" r="1.5"/>
    <circle cx="695" cy="300" r="1.5"/>
    <circle cx="745" cy="335" r="1.5"/>
  </g>

  <!-- Start marker -->
  <circle cx="530" cy="175" r="7" fill="#616161"/>
  <text x="530" y="162" text-anchor="middle" font-size="11" fill="#424242">시작</text>

  <!-- Target -->
  <rect x="790" y="360" width="20" height="20" fill="#1976d2" rx="2"/>
  <text x="800" y="398" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="600">좌석</text>

  <!-- Bottom annotations -->
  <text x="230" y="445" text-anchor="middle" font-size="13" fill="#c62828">↑ 기계 티가 명확 — 행동 기반 탐지에 쉽게 걸림</text>
  <text x="670" y="445" text-anchor="middle" font-size="13" fill="#0d47a1">↑ 사람 궤적 + 장인 속도로 위장</text>
</svg>
