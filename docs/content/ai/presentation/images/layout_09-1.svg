<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="1200" height="675" fill="#f8f9fa"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="88" fill="#1a237e"/>
  <text x="48" y="46" font-size="24" font-weight="700" fill="#ffffff">AI Defense — Online Plane</text>
  <text x="48" y="72" font-size="13" fill="#9fa8da">런타임 판정은 결정론 — LLM 없음, 지연 없음.</text>
  <text x="1160" y="50" text-anchor="end" font-size="13" fill="#7986cb">9-1 / 11</text>

  <!-- Principle badge -->
  <rect x="32" y="104" width="1136" height="36" rx="8" fill="#e8eaf6"/>
  <text x="600" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#1a237e">요청 → Istio → ext_authz → D0 Runtime   |   자연어 판단 없음 · 결정론적 규칙 · 요청 경로 지연 최소화</text>

  <!-- Tier boxes -->
  <rect x="60"  y="160" width="240" height="130" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <text x="180" y="196" text-anchor="middle" font-size="32" font-weight="700" fill="#2e7d32">T0</text>
  <text x="180" y="232" text-anchor="middle" font-size="18" fill="#2e7d32" font-weight="600">통과</text>
  <text x="180" y="278" text-anchor="middle" font-size="12" fill="#558b2f">정상 요청</text>

  <rect x="340" y="160" width="240" height="130" rx="12" fill="#fffde7" stroke="#fdd835" stroke-width="2"/>
  <text x="460" y="196" text-anchor="middle" font-size="32" font-weight="700" fill="#f57f17">T1</text>
  <text x="460" y="232" text-anchor="middle" font-size="18" fill="#f57f17" font-weight="600">약한 지연</text>
  <text x="460" y="278" text-anchor="middle" font-size="12" fill="#9e7d0a">~80ms</text>

  <rect x="620" y="160" width="240" height="130" rx="12" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="740" y="196" text-anchor="middle" font-size="32" font-weight="700" fill="#e65100">T2</text>
  <text x="740" y="232" text-anchor="middle" font-size="18" fill="#e65100" font-weight="600">강한 지연</text>
  <text x="740" y="278" text-anchor="middle" font-size="12" fill="#bf360c">~250ms</text>

  <rect x="900" y="160" width="240" height="130" rx="12" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="1020" y="196" text-anchor="middle" font-size="32" font-weight="700" fill="#b71c1c">T3</text>
  <text x="1020" y="232" text-anchor="middle" font-size="18" fill="#b71c1c" font-weight="600">차단</text>
  <text x="1020" y="278" text-anchor="middle" font-size="12" fill="#b71c1c">Block</text>

  <!-- Arrows between tiers -->
  <line x1="305" y1="225" x2="335" y2="225" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="585" y1="225" x2="615" y2="225" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="865" y1="225" x2="895" y2="225" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrG)"/>
  <defs>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b1fa2"/>
    </marker>
  </defs>

  <text x="600" y="328" text-anchor="middle" font-size="12" fill="#757575" font-style="italic">위험도가 올라갈수록 강한 개입 — 챌린지가 아닌 지연으로 완충</text>

  <!-- Separator -->
  <line x1="60" y1="348" x2="1140" y2="348" stroke="#e0e0e0" stroke-dasharray="6 4"/>
  <text x="600" y="342" text-anchor="middle" font-size="11" fill="#9e9e9e" font-weight="600">+ 별도 단계 게이트</text>

  <!-- VQA Gate flow -->
  <rect x="60"  y="364" width="200" height="64" rx="8" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="160" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#424242">대기열 / 진입</text>
  <text x="160" y="410" text-anchor="middle" font-size="11" fill="#757575">S0 ~ S3</text>

  <rect x="296" y="364" width="220" height="64" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2"/>
  <text x="406" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">좌석 선택 단계 진입</text>
  <text x="406" y="410" text-anchor="middle" font-size="11" fill="#6a1b9a">S4 · S5</text>

  <line x1="262" y1="396" x2="292" y2="396" stroke="#616161" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Diamond -->
  <polygon points="570,396 610,366 650,396 610,426" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="610" y="393" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">VQA</text>
  <text x="610" y="409" text-anchor="middle" font-size="11" fill="#e65100">통과?</text>

  <line x1="518" y1="396" x2="565" y2="396" stroke="#616161" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- YES -->
  <line x1="652" y1="396" x2="700" y2="396" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="676" y="388" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="700">YES</text>
  <rect x="700" y="366" width="160" height="64" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <text x="780" y="403" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">좌석 선택 진행</text>

  <!-- NO -->
  <line x1="610" y1="428" x2="610" y2="475" stroke="#e53935" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="622" y="455" font-size="11" fill="#c62828" font-weight="700">NO</text>
  <rect x="490" y="476" width="240" height="64" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="610" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">VQA 강제 (HTTP 428)</text>
  <text x="610" y="522" text-anchor="middle" font-size="11" fill="#b71c1c">등급과 무관하게 요구</text>

  <!-- Note -->
  <rect x="32" y="596" width="1136" height="55" rx="8" fill="#e8eaf6" stroke="#9fa8da"/>
  <text x="600" y="627" text-anchor="middle" font-size="12" fill="#1a237e" font-weight="600">※ VQA 관문은 "T2가 되면 뜨는 것"이 아니라, 좌석 선택 단계 진입 시점의 독립 게이트</text>
</svg>
