  <text x="650" y="158" font-size="13" font-weight="700" fill="#065f46">Queue Flow (1,000 VU)</text>

  <rect x="650" y="168" width="150" height="60" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="725" y="188" text-anchor="middle" font-size="11" fill="#6b7280">P99 레이턴시</text>
  <text x="725" y="216" text-anchor="middle" font-size="26" font-weight="800" fill="#059669">65ms</text>

  <rect x="820" y="168" width="150" height="60" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="895" y="188" text-anchor="middle" font-size="11" fill="#6b7280">503 에러</text>
  <text x="895" y="216" text-anchor="middle" font-size="26" font-weight="800" fill="#059669">0건</text>

  <rect x="990" y="168" width="150" height="60" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="1065" y="188" text-anchor="middle" font-size="11" fill="#6b7280">DB 커넥션 peak</text>
