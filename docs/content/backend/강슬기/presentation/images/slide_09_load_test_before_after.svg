  <rect x="70" y="338" width="490" height="45" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="315" y="356" text-anchor="middle" font-size="10" fill="#6b7280">스레드 200 → HikariCP 20개 경합 → 커넥션 대기 → accept-queue 포화 → 503</text>
  <text x="315" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">매 요청마다 Match·Section·Block·User DB 직접 조회</text>

  <!-- ========== AFTER BOX ========== -->
  <rect x="620" y="90" width="540" height="310" rx="14" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="620" y="90" width="540" height="40" rx="14" fill="#059669"/>
  <rect x="620" y="116" width="540" height="14" fill="#059669"/>
  <text x="890" y="118" text-anchor="middle" font-size="18" font-weight="800" fill="white">AFTER (Phase 4 완료)</text>

