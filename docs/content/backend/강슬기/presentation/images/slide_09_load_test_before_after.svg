  <text x="1065" y="228" text-anchor="middle" font-size="9" fill="#065f46">(-63% 여유)</text>

  <!-- After - what was done -->
  <text x="650" y="260" font-size="13" font-weight="700" fill="#065f46">적용한 최적화 (Phase 1~4)</text>

  <rect x="650" y="272" width="240" height="110" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="660" y="292" font-size="11" font-weight="600" fill="#065f46">Phase 1: Caffeine 로컬 캐시</text>
  <text x="660" y="308" font-size="10" fill="#374151">Match·Section·Block → 불변 데이터 캐싱</text>
  <text x="660" y="326" font-size="11" font-weight="600" fill="#065f46">Phase 2: Redis 분산 캐시</text>
  <text x="660" y="342" font-size="10" fill="#374151">User·auth-me → Pod 간 즉시 전파</text>
  <text x="660" y="360" font-size="11" font-weight="600" fill="#065f46">Phase 3: 응답 캐시 + 인프라 튜닝</text>
  <text x="660" y="376" font-size="10" fill="#374151">seat-groups 5s · Tomcat 200→400</text>

  <rect x="910" y="272" width="230" height="110" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1"/>
  <text x="920" y="292" font-size="11" font-weight="600" fill="#065f46">Phase 4: 커넥션 회전율 핫픽스</text>
  <text x="920" y="308" font-size="10" fill="#374151">Queue OSIV OFF → 회전율 2배</text>
  <text x="920" y="326" font-size="10" fill="#374151">Resilience4j @Retry → 300ms→60ms</text>
  <text x="920" y="344" font-size="10" fill="#374151">Redis Lua 통합 → 3 RTT→1 RTT</text>
  <text x="920" y="368" font-size="11" font-weight="700" fill="#059669">비용: $0</text>
  <text x="920" y="382" font-size="9" fill="#065f46">(DB 업그레이드 ~$100/월 회피)</text>

  <!-- ========== IMPROVEMENT BARS ========== -->
  <rect x="40" y="420" width="1120" height="170" rx="14" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow2)"/>
