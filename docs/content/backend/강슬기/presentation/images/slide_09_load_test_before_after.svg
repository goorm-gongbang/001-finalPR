  <text x="100" y="580" font-size="12" font-weight="600" fill="#374151">E2E 전체 Avg</text>
  <rect x="220" y="568" width="300" height="22" rx="4" fill="#fed7aa"/>
  <text x="230" y="584" font-size="11" font-weight="600" fill="#9a3412">503ms (Phase 3,4 적용 전)</text>
  <rect x="220" y="568" width="90" height="22" rx="4" fill="#bbf7d0"/>
  <text x="230" y="584" font-size="11" font-weight="600" fill="#065f46">149ms (적용 후)</text>
  <rect x="850" y="568" width="120" height="22" rx="11" fill="#059669"/>
  <text x="910" y="584" text-anchor="middle" font-size="13" font-weight="800" fill="white">-70.4%</text>

