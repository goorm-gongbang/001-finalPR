<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="26" font-weight="800" fill="#1a1f36">부하테스트 — 최적화 전후 비교</text>
  <text x="600" y="65" text-anchor="middle" font-size="14" fill="#5e6478">"DB 사양 문제가 아니라 앱이 쿼리를 너무 많이 보내는 문제였다" — 앱단 최적화로 해결 (비용 $0)</text>

  <!-- ========== BEFORE BOX ========== -->
  <rect x="40" y="90" width="540" height="310" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="40" y="90" width="540" height="40" rx="14" fill="#dc2626"/>
  <rect x="40" y="116" width="540" height="14" fill="#dc2626"/>
  <text x="310" y="118" text-anchor="middle" font-size="18" font-weight="800" fill="white">BEFORE (최적화 전)</text>

  <!-- Before metrics -->
  <text x="70" y="158" font-size="13" font-weight="700" fill="#991b1b">Queue Flow (1,000 VU)</text>

  <rect x="70" y="168" width="150" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="145" y="188" text-anchor="middle" font-size="11" fill="#6b7280">P99 레이턴시</text>
  <text x="145" y="216" text-anchor="middle" font-size="26" font-weight="800" fill="#dc2626">6,887ms</text>

  <rect x="240" y="168" width="150" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="315" y="188" text-anchor="middle" font-size="11" fill="#6b7280">503 에러</text>
  <text x="315" y="216" text-anchor="middle" font-size="26" font-weight="800" fill="#dc2626">58건</text>

  <rect x="410" y="168" width="150" height="60" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="485" y="188" text-anchor="middle" font-size="11" fill="#6b7280">DB 커넥션 peak</text>
  <text x="485" y="216" text-anchor="middle" font-size="26" font-weight="800" fill="#dc2626">270</text>
  <text x="485" y="228" text-anchor="middle" font-size="9" fill="#991b1b">(한계 도달)</text>

  <!-- Before diagnosis -->
  <text x="70" y="260" font-size="13" font-weight="700" fill="#991b1b">진단 결과 — DB는 놀고 있었다</text>

  <rect x="70" y="272" width="110" height="50" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="125" y="292" text-anchor="middle" font-size="11" fill="#6b7280">RDS CPU</text>
  <text x="125" y="313" text-anchor="middle" font-size="22" font-weight="800" fill="#059669">10%</text>

  <rect x="200" y="272" width="110" height="50" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="255" y="292" text-anchor="middle" font-size="11" fill="#6b7280">RDS 메모리</text>
  <text x="255" y="313" text-anchor="middle" font-size="22" font-weight="800" fill="#059669">25%</text>

  <rect x="330" y="272" width="230" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="445" y="292" text-anchor="middle" font-size="11" fill="#92400e">진짜 원인</text>
  <text x="445" y="313" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">커넥션 풀 포화 + 쿼리 과다</text>

